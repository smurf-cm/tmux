# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Prefix
set -g prefix C-o

# Navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind -n C-n next-window
bind -n C-p previous-window

# Terminal
set-window-option -g mode-keys vi
set -g default-terminal "tmux-256color"
set -g mouse on

# Copy
bind -n C-v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
# This single line handles both tmux buffer AND system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"j

# Plugins
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tpm'

set -g @catppuccin_flavor 'latte'

run "~/.config/tmux/plugins/catpuccin-tmux/catppuccin.tmux"

# Make the status line more pleasant.
set -g status-left ""
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W*"
set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '

# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100

setenv -g SSH_AUTH_SOCK $HOME/.ssh/ssh_auth_sock

# Initialize TMUX plugin manager (keep at the very bottom)
run-shell '~/.tmux/plugins/tpm/tpm'
